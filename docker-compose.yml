version: '3.8'

services:
  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hotstar-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hotstar-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service
  auth-service:
    build: 
      context: ./services/auth-services
    container_name: hotstar-auth-service
    restart: always
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - hotstar-network

  # User Service
  user-service:
    build: 
      context: ./services/user-services
    container_name: hotstar-user-service
    restart: always
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=production
      - PORT=5002
      - MONGO_URI=${MONGO_URI}
    networks:
      - hotstar-network

  # Video Service
  video-service:
    build: 
      context: ./services/video-services
    container_name: hotstar-video-service
    restart: always
    ports:
      - "5003:5003"
    environment:
      - NODE_ENV=production
      - PORT=5003
      - MONGO_URI=${MONGO_URI}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    volumes:
      - video_storage:/app/src/videos
    networks:
      - hotstar-network

  # Streaming Service
  streaming-service:
    build: 
      context: ./services/streaming-serices
    container_name: hotstar-streaming-service
    restart: always
    ports:
      - "5005:5005"
    environment:
      - NODE_ENV=production
      - PORT=5005
      - MONGO_URI=${MONGO_URI}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    volumes:
      - video_storage:/app/src/videos
    networks:
      - hotstar-network

  # Notification Service
  notification-service:
    build: 
      context: ./services/notification-services
    container_name: hotstar-notification-service
    restart: always
    ports:
      - "5006:5006"
    environment:
      - NODE_ENV=production
      - PORT=5006
      - MONGO_URI=${MONGO_URI}
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - hotstar-network

  # API Gateway
  api-gateway:
    build: 
      context: ./services/api-gateway
    container_name: hotstar-api-gateway
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - AUTH_SERVICE=http://auth-service:5001
      - USER_SERVICE=http://user-service:5002
      - VIDEO_SERVICE=http://video-service:5003
      - STREAMING_SERVICE=http://streaming-service:5005
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      video-service:
        condition: service_healthy
      streaming-service:
        condition: service_healthy
    networks:
      - hotstar-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://3.7.114.115:5000
    container_name: hotstar-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - hotstar-network

networks:
  hotstar-network:
    driver: bridge

volumes:
  rabbitmq_data:
  video_storage: