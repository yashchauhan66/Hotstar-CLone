version: '3.8'

services:
  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hotstar-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hotstar-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service
  auth-service:
    build: 
      context: ./services/auth-services
    container_name: hotstar-auth-service
    restart: always
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - PORT=5001
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - hotstar-network

  # User Service
  user-service:
    build: ./services/user-services
    container_name: hotstar-user-service
    restart: always
    ports:
      - "5002:5002"
    env_file: .env
    networks:
      - hotstar-network

  # Video Service
  video-service:
    build: ./services/video-services
    container_name: hotstar-video-service
    restart: always
    ports:
      - "5003:5003"
    env_file: .env
    volumes:
      - video_storage:/app/src/videos
    networks:
      - hotstar-network

  # Streaming Service
  streaming-service:
    build: ./services/streaming-serices
    container_name: hotstar-streaming-service
    restart: always
    ports:
      - "5005:5005"
    env_file: .env
    volumes:
      - video_storage:/app/src/videos
    networks:
      - hotstar-network

  # Notification Service
  notification-service:
    build: ./services/notification-services
    container_name: hotstar-notification-service
    restart: always
    ports:
      - "5006:5006"
    env_file: .env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - hotstar-network

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: hotstar-api-gateway
    restart: always
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - AUTH_SERVICE=http://auth-service:5001
      - USER_SERVICE=http://user-service:5002
      - VIDEO_SERVICE=http://video-service:5003
      - STREAMING_SERVICE=http://streaming-service:5005
    depends_on:
      - auth-service
      - user-service
      - video-service
      - streaming-service
    networks:
      - hotstar-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://3.7.114.115:5000
        - NEXT_PUBLIC_STREAMING_BASE_URL=http://3.7.114.115:5000/api/stream
    container_name: hotstar-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - hotstar-network

networks:
  hotstar-network:
    driver: bridge

volumes:
  rabbitmq_data:
  video_storage:
  mongodb_data:
