version: '3.8'

services:
  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hotstar-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hotstar-network

  # Auth Service
  auth-service:
    build: ./services/auth-services
    container_name: hotstar-auth-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - PORT=5001
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - rabbitmq
    networks:
      - hotstar-network

  # User Service
  user-service:
    build: ./services/user-services
    container_name: hotstar-user-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file: .env
    networks:
      - hotstar-network

  # Video Service (Previously missing in your docker ps)
  video-service:
    build: ./services/video-services
    container_name: hotstar-video-service
    restart: unless-stopped
    ports:
      - "5003:5003"
    env_file: .env
    volumes:
      - video_storage:/app/src/videos
    networks:
      - hotstar-network

  # Streaming Service
  streaming-service:
    build: ./services/streaming-serices
    container_name: hotstar-streaming-service
    restart: unless-stopped
    ports:
      - "5005:5005"
    env_file: .env
    volumes:
      - video_storage:/app/src/videos
    networks:
      - hotstar-network

  # Notification Service
  notification-service:
    build: ./services/notification-services
    container_name: hotstar-notification-service
    restart: unless-stopped
    ports:
      - "5006:5006"
    env_file: .env
    depends_on:
      - rabbitmq
    networks:
      - hotstar-network

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: hotstar-api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - auth-service
      - user-service
      - video-service
      - streaming-service
    networks:
      - hotstar-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://3.110.49.32:5000
    container_name: hotstar-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - hotstar-network

networks:
  hotstar-network:
    driver: bridge

volumes:
  rabbitmq_data:
  video_storage:
